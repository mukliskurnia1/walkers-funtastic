<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walkers - Sumedang Funtastic Walk</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f8f9fa; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>
    <iframe id="gas-iframe" src=""></iframe>

    <script>
        // Menangkap parameter dari URL domain Anda
        const urlParams = new URLSearchParams(window.location.search);
        const page = urlParams.get('page');
        
        // Link asli Google Script Anda
        let scriptUrl = "https://script.google.com/macros/s/AKfycbwPFpsX5sIDio2TMH6FkMgRSnGrUvGA-wVu6lmc-MQAM600GVdBrRpJ3lAUD0DZ8dp2/exec";
        
        // Jika ada parameter ?page=admin, tambahkan ke link script
        if (page) {
            scriptUrl += "?page=" + page;
        }
        
        // Terapkan ke Iframe
        document.getElementById('gas-iframe').src = scriptUrl;
    </script>
</body>
</html>
